    celestial:"CELESTIAL"
};

const rarityEmoji = {
    common:"⚪",
    rare:"🟢",
    epic:"🔵",
    legendary:"🟣",
    mythic:"🟡",
    ancient:"🔴",
    celestial:"🌈"
};

const colors = {
    common:"#b7b7b7",
    rare:"#48ff8b",
    epic:"#4aa3ff",
    legendary:"#c45cff",
    mythic:"#ffd34d",
    ancient:"#ff3737",
    celestial:"#6ffff5"
};

const values = {
    common:5,
    rare:20,
    epic:70,
    legendary:250,
    mythic:1000,
    ancient:3500,
    celestial:15000
};

function save(){
    localStorage.setItem("dragonCinematicSave", JSON.stringify(state));
}

function load(){
    const s = localStorage.getItem("dragonCinematicSave");
    if(s){
        try{
            state = {...state, ...JSON.parse(s)};
        }catch(e){}
    }
}

function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function roll(premium=false){
    let r = Math.random();
    r -= state.luck * 0.002;
    if(premium) r -= .16;

    if(r < .004) return "celestial";
    if(r < .018) return "ancient";
    if(r < .055) return "mythic";
    if(r < .125) return "legendary";
    if(r < .260) return "epic";
    if(r < .535) return "rare";
    return "common";
}

function hatch(cost=10, premium=false, silent=false){
    if(state.gold < cost){
        toast("Zu wenig Gold, Bruder.");
        return null;
    }

    state.gold -= cost;
    state.opened++;
    state.xp += premium ? 30 : 10;

    while(state.xp >= state.level * 90){
        state.xp -= state.level * 90;
        state.level++;
        state.gold += state.level * 80;
        toast("Level Up! Level " + state.level + " erreicht.");
    }

    const rarity = roll(premium);
    const item = {
        id:Date.now() + Math.random(),
        rarity:rarity,
        name:rand(dragons[rarity]),
        value:values[rarity]
    };

    state.inventory.unshift(item);
    state.found[rarity]++;

    if(!silent){
        runCinematic(item);
    }

    update();
    save();
    return item;
}

function runCinematic(item){
    const egg = document.getElementById("egg");
    egg.classList.remove("crack");
    void egg.offsetWidth;
    egg.classList.add("crack");

    playSound(item.rarity);

    const cinema = document.getElementById("cinema");
    const light = document.getElementById("cinemaLight");
    const eyes = document.getElementById("cinemaEyes");
    const dragon = document.getElementById("cinemaDragon");
    const smoke = document.getElementById("cinemaSmoke");
    const goofy = document.getElementById("goofyRunner");

    cinema.className = "";
    void cinema.offsetWidth;
    cinema.classList.add("show");

    light.style.background =
        "radial-gradient(circle, " + colors[item.rarity] + " 0%, transparent 45%)";

    eyes.style.color = colors[item.rarity];
    dragon.style.color = colors[item.rarity];
    dragon.innerHTML = bigDragonSVG(item.rarity);

    if(item.rarity === "common"){
        goofy.style.display = "block";
        dragon.style.display = "none";
        smoke.style.display = "none";
        eyes.style.display = "none";
        document.body.classList.remove("screen-shake");
    }else{
        goofy.style.display = "none";
        dragon.style.display = "block";
        smoke.style.display = "block";
        eyes.style.display = "block";
    }

    if(["legendary","mythic","ancient","celestial"].includes(item.rarity)){
        document.body.classList.remove("screen-shake");
        void document.body.offsetWidth;
        document.body.classList.add("screen-shake");
    }

    setTimeout(()=>{
        cinema.classList.remove("show");
        document.body.classList.remove("screen-shake");
        showResult(item);
    }, item.rarity === "common" ? 2600 : 3300);
}

function showResult(item){
    const result = document.getElementById("result");
    result.innerHTML = `
        <div class="card ${item.rarity}">
            ${cardDragonSVG(item.rarity)}
            <div class="rarity-pill ${item.rarity}">
                ${rarityEmoji[item.rarity]} ${rarityNames[item.rarity]}
            </div>
            <div class="dragon-name ${item.rarity}">
                ${item.name}
            </div>
            <div style="color:#bcb0cf;margin-top:8px;">
                Wert: ${item.value} Gold
            </div>
        </div>
    `;

    if(item.rarity === "common"){
        toast("Common Drop: " + item.name + " kam mit Pfandflaschen angerannt.");
    }else if(item.rarity === "celestial"){
        toast("CELESTIAL!!! GANZER BILDSCHIRM IST EXPLODIERT.");
    }else{
        toast(rarityNames[item.rarity] + " Drop: " + item.name);
    }
}

function open5(){
    if(state.gold < 50){
        toast("Du brauchst 50 Gold.");
        return;
    }

    let best = null;

    for(let i=0;i<5;i++){
        const item = hatch(10,false,true);
        if(!best || rarityOrder.indexOf(item.rarity) > rarityOrder.indexOf(best.rarity)){
            best = item;
        }
    }

    runCinematic(best);
    update();
    save();
}

function royalEgg(){
    hatch(150,true,false);
}

function sellItem(id){
    const index = state.inventory.findIndex(x=>x.id === id);
    if(index < 0) return;

    const item = state.inventory[index];
    state.gold += item.value;
    state.inventory.splice(index,1);
    toast(item.name + " verkauft für " + item.value + " Gold.");
    update();
    save();
}

function sellCommons(){
    let sold = 0;
    let earned = 0;

    state.inventory = state.inventory.filter(item=>{
        if(item.rarity === "common"){
            sold++;
            earned += item.value;
            return false;
        }
        return true;
    });

    state.gold += earned;
    toast(sold + " Common Drachen verkauft. +" + earned + " Gold.");
    update();
    save();
}

function buyLuck(){
    const cost = 200 + state.luckLevel * 300;

    if(state.gold < cost){
        toast("Nicht genug Gold für Luck.");
        return;
    }

    state.gold -= cost;
    state.luckLevel++;
    state.luck += 2;

    toast("Luck erhöht auf " + state.luck + "%.");
    update();
    save();
}

function goldBoost(){
    if(state.gold < 250){
        toast("Du brauchst 250 Gold.");
        return;
    }

    state.gold -= 250;
    const reward = 120 + Math.floor(Math.random() * 850);
    state.gold += reward;

    toast("Goldboost: +" + reward + " Gold.");
    update();
    save();
}

function daily(){
    const now = Date.now();
    const day = 86400000;

    if(now - state.lastDaily < day){
        toast("Daily wurde heute schon geholt.");
        return;
    }

    state.lastDaily = now;
    const reward = 350 + state.level * 50;
    state.gold += reward;

    toast("Daily Reward: +" + reward + " Gold.");
    update();
    save();
}

function update(){
    document.getElementById("gold").textContent = state.gold;
    document.getElementById("opened").textContent = state.opened;
    document.getElementById("level").textContent = state.level;
    document.getElementById("luck").textContent = state.luck + "%";
    document.getElementById("luckCost").textContent = 200 + state.luckLevel * 300;

    document.getElementById("openBtn").disabled = state.gold < 10;
    document.getElementById("open5Btn").disabled = state.gold < 50;

    renderInventory();
    renderStats();
}

function renderInventory(){
    const box = document.getElementById("inventory");

    if(state.inventory.length === 0){
        box.innerHTML = `<p style="color:#bcb0cf;">Noch keine Drachen. Öffne dein erstes Ei.</p>`;
        return;
    }

    box.innerHTML = state.inventory.map(item=>`
        <div class="item">
            <div>
                <b class="${item.rarity}">
                    ${rarityEmoji[item.rarity]} ${item.name}
                </b>
                <small>${rarityNames[item.rarity]} • Wert ${item.value} Gold</small>
            </div>
            <button onclick="sellItem(${item.id})">Sell</button>
        </div>
    `).join("");
}

function renderStats(){
    const box = document.getElementById("statsList");

    box.innerHTML = rarityOrder.map(r=>`
        <div class="item">
            <b class="${r}">${rarityEmoji[r]} ${rarityNames[r]}</b>
            <span>${state.found[r]}</span>
        </div>
    `).join("");
}

function tab(name){
    document.getElementById("invTab").style.display = name === "inv" ? "block" : "none";
    document.getElementById("shopTab").style.display = name === "shop" ? "block" : "none";
    document.getElementById("statsTab").style.display = name === "stats" ? "block" : "none";

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    const tabs = document.querySelectorAll(".tab");

    if(name === "inv") tabs[0].classList.add("active");
    if(name === "shop") tabs[1].classList.add("active");
    if(name === "stats") tabs[2].classList.add("active");
}

function toast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");

    setTimeout(()=>t.classList.remove("show"),2600);
}

function playSound(rarity){
    try{
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioCtx();

        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.connect(gain);
        gain.connect(ctx.destination);

        let freq = 180;

        if(rarity === "rare") freq = 260;
        if(rarity === "epic") freq = 340;
        if(rarity === "legendary") freq = 430;
        if(rarity === "mythic") freq = 520;
        if(rarity === "ancient") freq = 150;
        if(rarity === "celestial") freq = 680;

        osc.type = rarity === "common" ? "square" : "sawtooth";
        osc.frequency.setValueAtTime(freq, now);
        osc.frequency.exponentialRampToValueAtTime(freq * 2.2, now + .35);

        gain.gain.setValueAtTime(.0001, now);
        gain.gain.exponentialRampToValueAtTime(.18, now + .06);
        gain.gain.exponentialRampToValueAtTime(.0001, now + .7);

        osc.start(now);
        osc.stop(now + .75);

        if(["mythic","ancient","celestial"].includes(rarity)){
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();

            osc2.connect(gain2);
            gain2.connect(ctx.destination);

            osc2.type = "sine";
            osc2.frequency.setValueAtTime(freq / 2, now);
            osc2.frequency.exponentialRampToValueAtTime(freq * 1.5, now + 1.1);

            gain2.gain.setValueAtTime(.0001, now);
            gain2.gain.exponentialRampToValueAtTime(.16, now + .1);
            gain2.gain.exponentialRampToValueAtTime(.0001, now + 1.3);

            osc2.start(now);
            osc2.stop(now + 1.35);
        }
    }catch(e){}
}

    if(rarity === "legendary"){

        </div>
        `;
    }

    const c = colors[rarity];

        <path d="M190 190 C188 92, 330 92, 332 192 C336 286, 250 324, 210 286 C184 261, 184 225, 190 190 Z" fill="${c}"/>

document.getElementById("openBtn").addEventListener("click",()=>hatch(10,false,false));
document.getElementById("open5Btn").addEventListener("click",open5);
document.getElementById("sellCommonBtn").addEventListener("click",sellCommons);
document.getElementById("dailyBtn").addEventListener("click",daily);
document.getElementById("egg").addEventListener("click",()=>hatch(10,false,false));

load();
update();
</script>
